<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="エアコンの選び方：安さ重視グループ（メーカーおまかせ・アイリスオーヤマ）と省エネ・メーカー重視グループ（ダイキン・三菱・パナソニック）を示す図解">
  <rect width="640" height="400" rx="20" fill="#fdf9f5"/>

  <!-- divider -->
  <line x1="320" y1="52" x2="320" y2="348" stroke="#2d2420" stroke-opacity="0.12" stroke-width="2" stroke-dasharray="4 6"/>

  <!-- ===== LEFT: 安さ重視 ===== -->
  <g>
    <text x="160" y="38" text-anchor="middle" font-size="20" font-weight="800" fill="#5b8fb9">安さ重視</text>

    <!-- coin / yen icon (代わりにシンプルな¥記号) -->
    <circle cx="160" cy="110" r="40" fill="none" stroke="#5b8fb9" stroke-width="3"/>
    <text x="160" y="121" text-anchor="middle" font-size="36" font-weight="900" fill="#5b8fb9">¥</text>

    <!-- down arrow (low cost) -->
    <line x1="160" y1="155" x2="160" y2="175" stroke="#5b8fb9" stroke-width="3" stroke-linecap="round"/>
    <path d="M152 170 l8 8 l8 -8" fill="none" stroke="#5b8fb9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="160" y="210" text-anchor="middle" font-size="15" font-weight="700" fill="#2d2420">費用を抑えて導入したい</text>
    <text x="160" y="234" text-anchor="middle" font-size="12" fill="#2d2420" opacity="0.65">6畳おまかせセット</text>
    <text x="160" y="252" text-anchor="middle" font-size="12" fill="#2d2420" opacity="0.65">アイリスオーヤマ Gシリーズ</text>
    <text x="160" y="270" text-anchor="middle" font-size="12" fill="#2d2420" opacity="0.65">6〜20畳の展開あり</text>
    <text x="160" y="296" text-anchor="middle" font-size="12" fill="#2d2420" opacity="0.5">※届くメーカー・機種は指定不可</text>
    <text x="160" y="313" text-anchor="middle" font-size="12" fill="#2d2420" opacity="0.5">（おまかせの場合）</text>
  </g>

  <!-- ===== RIGHT: 省エネ・メーカー重視 ===== -->
  <g>
    <text x="480" y="38" text-anchor="middle" font-size="18" font-weight="800" fill="#6a9e7f">省エネ・メーカー重視</text>

    <!-- leaf / eco icon -->
    <path d="M480 72 C 480 72, 452 82, 452 108 C 452 126, 462 138, 474 142 L 470 152" fill="none" stroke="#6a9e7f" stroke-width="3" stroke-linecap="round"/>
    <path d="M480 72 C 480 72, 508 82, 508 108 C 508 126, 496 138, 482 142" fill="none" stroke="#6a9e7f" stroke-width="3" stroke-linecap="round"/>
    <path d="M480 72 C 480 72, 452 82, 452 108 C 452 126, 462 138, 474 142 L 470 152 C 480 72 508 82 508 108 C 508 126 496 138 482 142 Z" fill="#6a9e7f" opacity="0.12"/>

    <text x="480" y="210" text-anchor="middle" font-size="15" font-weight="700" fill="#2d2420">メーカー品質・省エネで選ぶ</text>
    <text x="480" y="234" text-anchor="middle" font-size="12" fill="#2d2420" opacity="0.65">ダイキン S285ATES（10畳）</text>
    <text x="480" y="252" text-anchor="middle" font-size="12" fill="#2d2420" opacity="0.65">三菱 霧ヶ峰 Z（18畳）</text>
    <text x="480" y="270" text-anchor="middle" font-size="12" fill="#2d2420" opacity="0.65">パナソニック エオリアEX（20畳）</text>
    <text x="480" y="296" text-anchor="middle" font-size="12" fill="#2d2420" opacity="0.5">省エネ上位機・大手メーカー</text>
    <text x="480" y="313" text-anchor="middle" font-size="12" fill="#2d2420" opacity="0.5">工事費込み・全国工事対応</text>
  </g>

  <text x="320" y="370" text-anchor="middle" font-size="12" fill="#2d2420" opacity="0.5">※選び方の方向性を示した概念図です。価格・在庫は各ストアで最新情報をご確認ください。</text>
</svg>
