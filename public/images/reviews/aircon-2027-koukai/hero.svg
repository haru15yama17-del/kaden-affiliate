<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-label="壁掛けエアコンのシルエットと、工事費込み・2027省エネ基準・畳数で選ぶ・安さまたは省エネ重視の選び方を示す図解">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef1f4"/>
      <stop offset="1" stop-color="#e8f0e9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" rx="28" fill="url(#bg)"/>

  <!-- connector lines from unit to feature icons -->
  <g stroke="#5b8fb9" stroke-width="2" stroke-dasharray="4 6" opacity="0.45">
    <line x1="338" y1="218" x2="192" y2="118"/>
    <line x1="462" y1="218" x2="608" y2="118"/>
    <line x1="338" y1="268" x2="192" y2="368"/>
    <line x1="462" y1="268" x2="608" y2="368"/>
  </g>

  <!-- wall-mounted aircon unit (center) -->
  <g>
    <!-- shadow -->
    <ellipse cx="400" cy="305" rx="120" ry="10" fill="#2d2420" opacity="0.07"/>
    <!-- main body -->
    <rect x="280" y="196" width="240" height="88" rx="18" fill="#5b8fb9"/>
    <!-- top accent strip -->
    <rect x="280" y="196" width="240" height="18" rx="18" fill="#4a7fa8"/>
    <rect x="280" y="207" width="240" height="7" fill="#4a7fa8"/>
    <!-- air outlet vents (horizontal slats) -->
    <rect x="292" y="228" width="216" height="44" rx="6" fill="#3d6f93"/>
    <g stroke="#6fa8d0" stroke-width="2" opacity="0.7">
      <line x1="294" y1="238" x2="506" y2="238"/>
      <line x1="294" y1="250" x2="506" y2="250"/>
      <line x1="294" y1="262" x2="506" y2="262"/>
    </g>
    <!-- flap (lower air direction) -->
    <rect x="290" y="273" width="220" height="8" rx="4" fill="#2d5f80" opacity="0.6"/>
    <!-- control panel right side -->
    <rect x="456" y="204" width="52" height="18" rx="5" fill="#d5e8f5"/>
    <!-- power LED -->
    <circle cx="470" cy="213" r="4" fill="#7ecba8"/>
    <!-- wifi indicator -->
    <circle cx="488" cy="213" r="3" fill="#a8cfe8"/>
    <!-- standby light -->
    <circle cx="501" cy="213" r="3" fill="#f5c97a"/>
  </g>

  <!-- feature: 工事費込み (top left) -->
  <g>
    <circle cx="162" cy="108" r="52" fill="#ffffff" stroke="#5b8fb9" stroke-width="2.5"/>
    <!-- wrench icon -->
    <path d="M162 78 C 148 78, 138 88, 138 102 C 138 112, 144 120, 153 124 L 146 134 C 144 136, 144 139, 146 141 C 148 143, 151 143, 153 141 L 160 131 C 161 131, 162 132, 163 132 L 175 144 C 177 146, 180 146, 182 144 C 184 142, 184 139, 182 137 L 170 125 C 174 121, 176 115, 176 109 L 168 109 C 168 115, 164 120, 158 122 C 152 120, 148 115, 148 109 C 148 102, 154 97, 161 97" fill="none" stroke="#5b8fb9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- simpler wrench -->
    <path d="M150 85 C 143 92, 143 104, 150 110 L 172 132 C 174 134, 177 134, 179 132 C 181 130, 181 127, 179 125 L 157 103 C 163 97, 164 88, 160 82 Z" fill="#5b8fb9" opacity="0.7"/>
    <text x="162" y="180" text-anchor="middle" font-size="17" font-weight="800" fill="#2d2420">工事費込み</text>
  </g>

  <!-- feature: 2027省エネ基準 (top right) -->
  <g>
    <circle cx="638" cy="108" r="52" fill="#ffffff" stroke="#6a9e7f" stroke-width="2.5"/>
    <!-- leaf icon -->
    <path d="M638 76 C 638 76, 614 84, 614 108 C 614 122, 622 132, 632 136 L 628 144 C 627 146, 628 148, 630 148 C 632 148, 634 147, 635 145 L 638 138 C 652 136, 662 124, 662 108 C 662 84, 638 76, 638 76Z" fill="#6a9e7f" opacity="0.3"/>
    <path d="M638 76 C 638 76, 614 84, 614 108 C 614 122, 622 132, 632 136 L 628 144" fill="none" stroke="#6a9e7f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M638 76 C 638 76, 662 84, 662 108 C 662 124, 650 135, 636 138" fill="none" stroke="#6a9e7f" stroke-width="3" stroke-linecap="round"/>
    <!-- 2027 text inside leaf -->
    <text x="638" y="115" text-anchor="middle" font-size="16" font-weight="900" fill="#3f6b53">2027</text>
    <text x="638" y="130" text-anchor="middle" font-size="10" font-weight="700" fill="#3f6b53">省エネ基準</text>
    <text x="638" y="180" text-anchor="middle" font-size="17" font-weight="800" fill="#2d2420">省エネ基準UP</text>
  </g>

  <!-- feature: 畳数で選ぶ (bottom left) -->
  <g>
    <circle cx="162" cy="368" r="52" fill="#ffffff" stroke="#4a7fa8" stroke-width="2.5"/>
    <!-- home / room icon -->
    <path d="M162 336 L 138 356 L 144 356 L 144 398 L 180 398 L 180 356 L 186 356 Z" fill="none" stroke="#4a7fa8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- door -->
    <rect x="155" y="378" width="14" height="20" rx="2" fill="none" stroke="#4a7fa8" stroke-width="2.5"/>
    <!-- window -->
    <rect x="148" y="361" width="10" height="10" rx="1.5" fill="none" stroke="#4a7fa8" stroke-width="2"/>
    <!--畳数ラベル -->
    <text x="162" y="354" text-anchor="middle" font-size="9" font-weight="700" fill="#4a7fa8">6〜20畳</text>
    <text x="162" y="442" text-anchor="middle" font-size="17" font-weight="800" fill="#2d2420">畳数で選ぶ</text>
  </g>

  <!-- feature: 安さ重視 or 省エネ重視 (bottom right) -->
  <g>
    <circle cx="638" cy="368" r="52" fill="#ffffff" stroke="#c0895a" stroke-width="2.5"/>
    <!-- balance scale icon -->
    <!-- pole -->
    <line x1="638" y1="344" x2="638" y2="396" stroke="#c0895a" stroke-width="3" stroke-linecap="round"/>
    <!-- arm -->
    <line x1="614" y1="358" x2="662" y2="358" stroke="#c0895a" stroke-width="3" stroke-linecap="round"/>
    <!-- left pan chain -->
    <line x1="617" y1="358" x2="613" y2="372" stroke="#c0895a" stroke-width="2" stroke-linecap="round"/>
    <line x1="621" y1="358" x2="617" y2="372" stroke="#c0895a" stroke-width="2" stroke-linecap="round"/>
    <!-- left pan -->
    <path d="M609 372 Q 619 380, 629 372" fill="none" stroke="#c0895a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- right pan chain -->
    <line x1="659" y1="358" x2="655" y2="372" stroke="#c0895a" stroke-width="2" stroke-linecap="round"/>
    <line x1="663" y1="358" x2="659" y2="372" stroke="#c0895a" stroke-width="2" stroke-linecap="round"/>
    <!-- right pan -->
    <path d="M651 372 Q 661 380, 671 372" fill="none" stroke="#c0895a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- ¥ label left -->
    <text x="619" y="371" text-anchor="middle" font-size="10" font-weight="800" fill="#c0895a">安さ</text>
    <!-- eco label right -->
    <text x="661" y="371" text-anchor="middle" font-size="10" font-weight="800" fill="#6a9e7f">省エネ</text>
    <!-- base -->
    <rect x="632" y="394" width="12" height="6" rx="2" fill="#c0895a"/>
    <text x="638" y="442" text-anchor="middle" font-size="14" font-weight="800" fill="#2d2420">安さ or 省エネ？</text>
  </g>
</svg>
