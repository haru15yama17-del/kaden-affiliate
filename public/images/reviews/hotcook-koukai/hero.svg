<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-label="ホットクック本体のシルエットと、無水調理・予約調理・かきまぜ・保温の機能アイコンを示す図解">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef1f4"/>
      <stop offset="1" stop-color="#e8f0e9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" rx="28" fill="url(#bg)"/>

  <!-- connector lines from pot to feature icons -->
  <g stroke="#c45c78" stroke-width="2" stroke-dasharray="4 6" opacity="0.45">
    <line x1="320" y1="185" x2="190" y2="115"/>
    <line x1="480" y1="185" x2="610" y2="115"/>
    <line x1="320" y1="285" x2="190" y2="345"/>
    <line x1="480" y1="285" x2="610" y2="345"/>
  </g>

  <!-- hot cook pot (center, large) -->
  <g>
    <!-- shadow -->
    <ellipse cx="400" cy="333" rx="118" ry="16" fill="#2d2420" opacity="0.08"/>
    <!-- handles -->
    <rect x="262" y="235" width="26" height="40" rx="10" fill="#a8445b"/>
    <rect x="512" y="235" width="26" height="40" rx="10" fill="#a8445b"/>
    <!-- body -->
    <rect x="288" y="210" width="224" height="120" rx="34" fill="#c45c78"/>
    <!-- control panel lid -->
    <rect x="288" y="165" width="224" height="62" rx="26" fill="#d77890"/>
    <rect x="328" y="185" width="144" height="24" rx="10" fill="#fef1f4"/>
    <circle cx="350" cy="197" r="6" fill="#c45c78"/>
    <circle cx="378" cy="197" r="6" fill="#c4924a"/>
    <circle cx="406" cy="197" r="6" fill="#6a9e7f"/>
    <rect x="430" y="191" width="32" height="12" rx="6" fill="#e8b9c5"/>
    <!-- base ring -->
    <rect x="300" y="311" width="200" height="14" rx="7" fill="#a8445b"/>
  </g>

  <!-- feature: 無水調理 (top left) -->
  <g>
    <circle cx="160" cy="105" r="52" fill="#ffffff" stroke="#6a9e7f" stroke-width="2.5"/>
    <path d="M160 79 C 144 103, 144 117, 160 123 C 176 117, 176 103, 160 79 Z" fill="#6a9e7f"/>
    <text x="160" y="178" text-anchor="middle" font-size="18" font-weight="800" fill="#2d2420">無水調理</text>
  </g>

  <!-- feature: 予約調理 (top right) -->
  <g>
    <circle cx="640" cy="105" r="52" fill="#ffffff" stroke="#c4924a" stroke-width="2.5"/>
    <circle cx="640" cy="105" r="26" fill="none" stroke="#c4924a" stroke-width="4"/>
    <line x1="640" y1="105" x2="640" y2="87" stroke="#c4924a" stroke-width="4" stroke-linecap="round"/>
    <line x1="640" y1="105" x2="654" y2="113" stroke="#c4924a" stroke-width="4" stroke-linecap="round"/>
    <text x="640" y="178" text-anchor="middle" font-size="18" font-weight="800" fill="#2d2420">予約調理</text>
  </g>

  <!-- feature: 自動かきまぜ (bottom left) -->
  <g>
    <circle cx="160" cy="365" r="52" fill="#ffffff" stroke="#c45c78" stroke-width="2.5"/>
    <path d="M160 343 C 178 343, 184 361, 168 369 C 152 377, 144 359, 160 351" fill="none" stroke="#c45c78" stroke-width="5" stroke-linecap="round"/>
    <circle cx="161" cy="350" r="3.5" fill="#c45c78"/>
    <text x="160" y="438" text-anchor="middle" font-size="18" font-weight="800" fill="#2d2420">自動かきまぜ</text>
  </g>

  <!-- feature: 保温 (bottom right) -->
  <g>
    <circle cx="640" cy="365" r="52" fill="#ffffff" stroke="#e08a4a" stroke-width="2.5"/>
    <rect x="634" y="339" width="12" height="34" rx="6" fill="#e08a4a"/>
    <circle cx="640" cy="379" r="10" fill="#e08a4a"/>
    <text x="640" y="438" text-anchor="middle" font-size="18" font-weight="800" fill="#2d2420">保温</text>
  </g>
</svg>
