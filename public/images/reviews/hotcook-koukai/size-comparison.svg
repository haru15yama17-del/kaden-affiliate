<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" role="img" aria-label="ホットクック2.4Lと5合炊き炊飯器の大きさを比較した図解">
  <rect width="640" height="380" rx="20" fill="#fdf9f5"/>

  <!-- HotCook -->
  <g>
    <!-- width dimension -->
    <line x1="60" y1="70" x2="260" y2="70" stroke="#c45c78" stroke-width="2"/>
    <path d="M60 70 l10 -6 v12 z" fill="#c45c78"/>
    <path d="M260 70 l-10 -6 v12 z" fill="#c45c78"/>
    <text x="160" y="58" text-anchor="middle" font-size="18" font-weight="700" fill="#c45c78">横幅 約35cm</text>

    <!-- handles -->
    <rect x="44" y="150" width="20" height="30" rx="8" fill="#c45c78"/>
    <rect x="256" y="150" width="20" height="30" rx="8" fill="#c45c78"/>
    <!-- body -->
    <rect x="64" y="100" width="192" height="150" rx="22" fill="#c45c78"/>
    <rect x="64" y="100" width="192" height="36" rx="18" fill="#d77890"/>
    <circle cx="160" cy="118" r="8" fill="#fef1f4"/>

    <text x="160" y="280" text-anchor="middle" font-size="20" font-weight="700" fill="#2d2420">ホットクック 2.4L</text>
    <text x="160" y="306" text-anchor="middle" font-size="15" fill="#2d2420" opacity="0.6">奥行 約31cm（目安）</text>
  </g>

  <!-- Rice cooker -->
  <g>
    <line x1="400" y1="100" x2="560" y2="100" stroke="#6a9e7f" stroke-width="2"/>
    <path d="M400 100 l10 -6 v12 z" fill="#6a9e7f"/>
    <path d="M560 100 l-10 -6 v12 z" fill="#6a9e7f"/>
    <text x="480" y="88" text-anchor="middle" font-size="18" font-weight="700" fill="#6a9e7f">横幅 約25cm</text>

    <rect x="400" y="130" width="160" height="120" rx="18" fill="#6a9e7f"/>
    <rect x="400" y="130" width="160" height="30" rx="14" fill="#8bb89e"/>
    <circle cx="480" cy="145" r="7" fill="#fef1f4"/>

    <text x="480" y="280" text-anchor="middle" font-size="20" font-weight="700" fill="#2d2420">5合炊き炊飯器</text>
    <text x="480" y="306" text-anchor="middle" font-size="15" fill="#2d2420" opacity="0.6">奥行 約32cm（目安）</text>
  </g>

  <!-- baseline -->
  <line x1="40" y1="250" x2="600" y2="250" stroke="#2d2420" stroke-opacity="0.15" stroke-width="2"/>
  <text x="320" y="350" text-anchor="middle" font-size="14" fill="#2d2420" opacity="0.5">※サイズは一般的なモデルの目安です。購入前に必ず実機の寸法をご確認ください。</text>
</svg>
