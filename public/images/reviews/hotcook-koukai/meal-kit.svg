<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" role="img" aria-label="ホットクックの鍋アイコンとカット済み食材のアイコンを組み合わせた図解イラスト">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef1f4"/>
      <stop offset="1" stop-color="#e8f0e9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="360" rx="28" fill="url(#bg2)"/>

  <!-- hot cook pot (left) -->
  <g>
    <ellipse cx="230" cy="220" rx="92" ry="32" fill="#a8445b"/>
    <rect x="138" y="170" width="184" height="58" rx="28" fill="#c45c78"/>
    <ellipse cx="230" cy="170" rx="92" ry="20" fill="#d77890"/>
    <circle cx="230" cy="170" r="8" fill="#fef1f4"/>
    <rect x="126" y="188" width="18" height="14" rx="6" fill="#c45c78"/>
    <rect x="316" y="188" width="18" height="14" rx="6" fill="#c45c78"/>
    <!-- steam -->
    <g stroke="#ffffff" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7">
      <path d="M205 130 C 195 112, 215 100, 205 82"/>
      <path d="M230 126 C 220 108, 240 96, 230 78"/>
      <path d="M255 130 C 245 112, 265 100, 255 82"/>
    </g>
    <text x="230" y="282" text-anchor="middle" font-size="20" font-weight="800" fill="#2d2420">ホットクック</text>
  </g>

  <!-- plus -->
  <text x="400" y="200" text-anchor="middle" font-size="48" font-weight="800" fill="#c4924a">+</text>

  <!-- meal kit ingredients (right) -->
  <g>
    <rect x="500" y="150" width="220" height="120" rx="18" fill="#fdf9f5" stroke="#e3d3bd" stroke-width="2"/>
    <!-- carrot -->
    <g>
      <path d="M530 235 L552 188 a8 8 0 0 1 14 6 L548 240 Z" fill="#e08a4a"/>
      <path d="M548 192 l6 -14 M556 196 l8 -12" stroke="#6a9e7f" stroke-width="4" stroke-linecap="round"/>
    </g>
    <!-- broccoli -->
    <g>
      <circle cx="610" cy="200" r="20" fill="#6a9e7f"/>
      <circle cx="596" cy="190" r="12" fill="#7fae8f"/>
      <circle cx="624" cy="190" r="12" fill="#7fae8f"/>
      <rect x="604" y="212" width="12" height="26" rx="5" fill="#cdb98c"/>
    </g>
    <!-- meat package -->
    <rect x="650" y="205" width="56" height="40" rx="8" fill="#e3a3ab"/>
    <rect x="650" y="205" width="56" height="14" rx="6" fill="#f0c4ca"/>

    <text x="610" y="282" text-anchor="middle" font-size="20" font-weight="800" fill="#2d2420">カット済み食材</text>
  </g>
</svg>
