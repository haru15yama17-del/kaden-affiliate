<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="コンプレッサー式除湿機（夏に強く省エネ）とデシカント式除湿機（冬も使える・消費電力大）の仕組みの違いを示す図解">
  <rect width="640" height="400" rx="20" fill="#fdf9f5"/>

  <!-- divider -->
  <line x1="320" y1="56" x2="320" y2="344" stroke="#2d2420" stroke-opacity="0.12" stroke-width="2" stroke-dasharray="4 6"/>

  <!-- ===== LEFT: コンプレッサー式 ===== -->
  <g>
    <text x="160" y="40" text-anchor="middle" font-size="20" font-weight="800" fill="#5b8fb9">コンプレッサー式</text>

    <!-- dehumidifier body -->
    <rect x="112" y="96" width="84" height="140" rx="14" fill="#5b8fb9"/>
    <!-- grill -->
    <rect x="120" y="112" width="68" height="64" rx="6" fill="#3d6f93"/>
    <g stroke="#6fa8d0" stroke-width="1.5" opacity="0.7">
      <line x1="122" y1="124" x2="186" y2="124"/>
      <line x1="122" y1="136" x2="186" y2="136"/>
      <line x1="122" y1="148" x2="186" y2="148"/>
      <line x1="122" y1="160" x2="186" y2="160"/>
      <line x1="122" y1="172" x2="186" y2="172"/>
    </g>
    <!-- water tank bottom -->
    <rect x="118" y="202" width="72" height="26" rx="7" fill="#a8cfe8"/>
    <rect x="124" y="208" width="60" height="14" rx="4" fill="#5b8fb9" opacity="0.45"/>

    <!-- sun icon (夏に強い) -->
    <circle cx="228" cy="128" r="20" fill="none" stroke="#e08a4a" stroke-width="3"/>
    <g stroke="#e08a4a" stroke-width="2" stroke-linecap="round">
      <line x1="228" y1="102" x2="228" y2="96"/>
      <line x1="228" y1="154" x2="228" y2="160"/>
      <line x1="202" y1="128" x2="196" y2="128"/>
      <line x1="254" y1="128" x2="260" y2="128"/>
      <line x1="210" y1="110" x2="205" y2="105"/>
      <line x1="246" y1="146" x2="251" y2="151"/>
      <line x1="246" y1="110" x2="251" y2="105"/>
      <line x1="210" y1="146" x2="205" y2="151"/>
    </g>

    <text x="160" y="268" text-anchor="middle" font-size="15" font-weight="700" fill="#2d2420">夏の高温多湿に強い</text>
    <text x="160" y="290" text-anchor="middle" font-size="12" fill="#2d2420" opacity="0.62">消費電力が比較的少ない傾向</text>
    <text x="160" y="310" text-anchor="middle" font-size="12" fill="#2d2420" opacity="0.62">冬（低温時）は能力が低下しやすい</text>
    <text x="160" y="330" text-anchor="middle" font-size="12" fill="#2d2420" opacity="0.62">排熱で室温が上がりやすい</text>
  </g>

  <!-- ===== RIGHT: デシカント式 ===== -->
  <g>
    <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="800" fill="#6a9e7f">デシカント式</text>

    <!-- dehumidifier body -->
    <rect x="444" y="96" width="84" height="140" rx="14" fill="#6a9e7f"/>
    <!-- heater coil (吸湿剤 + ヒーター symbol) -->
    <path d="M454 142 C 466 132, 478 150, 490 140 C 502 130, 514 148, 520 138" fill="none" stroke="#3f6b53" stroke-width="3.5" stroke-linecap="round"/>
    <!-- grill lines at bottom half -->
    <g stroke="#8bb89e" stroke-width="1.5" opacity="0.6">
      <line x1="452" y1="168" x2="520" y2="168"/>
      <line x1="452" y1="180" x2="520" y2="180"/>
      <line x1="452" y1="192" x2="520" y2="192"/>
    </g>
    <!-- water tank bottom -->
    <rect x="450" y="202" width="72" height="26" rx="7" fill="#a8cfe8"/>
    <rect x="456" y="208" width="60" height="14" rx="4" fill="#5b8fb9" opacity="0.45"/>

    <!-- snowflake icon (冬も使える) -->
    <g stroke="#5b8fb9" stroke-width="2.5" stroke-linecap="round">
      <line x1="560" y1="108" x2="560" y2="148"/>
      <line x1="540" y1="128" x2="580" y2="128"/>
      <line x1="547" y1="115" x2="573" y2="141"/>
      <line x1="573" y1="115" x2="547" y2="141"/>
      <!-- branch tips -->
      <line x1="560" y1="108" x2="555" y2="114"/>
      <line x1="560" y1="108" x2="565" y2="114"/>
      <line x1="560" y1="148" x2="555" y2="142"/>
      <line x1="560" y1="148" x2="565" y2="142"/>
      <line x1="540" y1="128" x2="546" y2="123"/>
      <line x1="540" y1="128" x2="546" y2="133"/>
      <line x1="580" y1="128" x2="574" y2="123"/>
      <line x1="580" y1="128" x2="574" y2="133"/>
    </g>

    <text x="480" y="268" text-anchor="middle" font-size="15" font-weight="700" fill="#2d2420">冬でも使える・通年タイプ</text>
    <text x="480" y="290" text-anchor="middle" font-size="12" fill="#2d2420" opacity="0.62">電熱ヒーター使用で消費電力が大きい傾向</text>
    <text x="480" y="310" text-anchor="middle" font-size="12" fill="#2d2420" opacity="0.62">低温時でも除湿能力が落ちにくい</text>
    <text x="480" y="330" text-anchor="middle" font-size="12" fill="#2d2420" opacity="0.62">ヒーター熱で室温が上がりやすい</text>
  </g>

  <text x="320" y="372" text-anchor="middle" font-size="12" fill="#2d2420" opacity="0.5">※方式の一般的な特性を示した図解です。実際のスペックは機種により異なります。</text>
</svg>
