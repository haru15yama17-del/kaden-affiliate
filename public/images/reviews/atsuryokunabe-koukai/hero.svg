<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-label="電気圧力鍋本体のシルエットと、加圧調理・予約調理・ほったらかし・煮込みの機能アイコンを示す図解">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef1f4"/>
      <stop offset="1" stop-color="#e8f0e9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" rx="28" fill="url(#bg)"/>

  <!-- connector lines from pot to feature icons -->
  <g stroke="#c45c78" stroke-width="2" stroke-dasharray="4 6" opacity="0.45">
    <line x1="322" y1="190" x2="190" y2="115"/>
    <line x1="478" y1="190" x2="610" y2="115"/>
    <line x1="322" y1="290" x2="190" y2="345"/>
    <line x1="478" y1="290" x2="610" y2="345"/>
  </g>

  <!-- electric pressure cooker (center) -->
  <g>
    <!-- shadow -->
    <ellipse cx="400" cy="340" rx="110" ry="15" fill="#2d2420" opacity="0.08"/>
    <!-- side handles -->
    <rect x="276" y="250" width="24" height="38" rx="9" fill="#a8445b"/>
    <rect x="500" y="250" width="24" height="38" rx="9" fill="#a8445b"/>
    <!-- body -->
    <rect x="296" y="225" width="208" height="115" rx="30" fill="#c45c78"/>
    <!-- locking lid -->
    <rect x="290" y="180" width="220" height="60" rx="26" fill="#d77890"/>
    <!-- pressure weight / valve on top -->
    <rect x="384" y="150" width="32" height="22" rx="6" fill="#a8445b"/>
    <circle cx="400" cy="150" r="9" fill="#a8445b"/>
    <!-- steam from valve -->
    <path d="M400 142 C 392 132, 408 126, 400 116" fill="none" stroke="#9bb7a8" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <path d="M418 144 C 412 136, 424 131, 418 122" fill="none" stroke="#9bb7a8" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
    <!-- control panel -->
    <rect x="326" y="262" width="148" height="42" rx="10" fill="#fef1f4"/>
    <rect x="342" y="276" width="60" height="14" rx="7" fill="#c45c78"/>
    <circle cx="430" cy="283" r="9" fill="none" stroke="#c4924a" stroke-width="4"/>
    <line x1="430" y1="283" x2="430" y2="277" stroke="#c4924a" stroke-width="3" stroke-linecap="round"/>
    <!-- base ring -->
    <rect x="308" y="324" width="184" height="14" rx="7" fill="#a8445b"/>
  </g>

  <!-- feature: 加圧調理 (top left) -->
  <g>
    <circle cx="160" cy="105" r="52" fill="#ffffff" stroke="#c45c78" stroke-width="2.5"/>
    <circle cx="160" cy="110" r="24" fill="none" stroke="#c45c78" stroke-width="3"/>
    <line x1="160" y1="110" x2="176" y2="96" stroke="#c45c78" stroke-width="4" stroke-linecap="round"/>
    <circle cx="160" cy="110" r="3.5" fill="#c45c78"/>
    <line x1="138" y1="110" x2="143" y2="110" stroke="#c45c78" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="177" y1="110" x2="182" y2="110" stroke="#c45c78" stroke-width="2.5" stroke-linecap="round"/>
    <text x="160" y="178" text-anchor="middle" font-size="18" font-weight="800" fill="#2d2420">加圧調理</text>
  </g>

  <!-- feature: 予約調理 (top right) -->
  <g>
    <circle cx="640" cy="105" r="52" fill="#ffffff" stroke="#c4924a" stroke-width="2.5"/>
    <circle cx="640" cy="105" r="26" fill="none" stroke="#c4924a" stroke-width="4"/>
    <line x1="640" y1="105" x2="640" y2="87" stroke="#c4924a" stroke-width="4" stroke-linecap="round"/>
    <line x1="640" y1="105" x2="654" y2="113" stroke="#c4924a" stroke-width="4" stroke-linecap="round"/>
    <text x="640" y="178" text-anchor="middle" font-size="18" font-weight="800" fill="#2d2420">予約調理</text>
  </g>

  <!-- feature: ほったらかし (bottom left) -->
  <g>
    <circle cx="160" cy="365" r="52" fill="#ffffff" stroke="#6a9e7f" stroke-width="2.5"/>
    <path d="M142 366 l12 12 l22 -24" fill="none" stroke="#6a9e7f" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="160" y="438" text-anchor="middle" font-size="18" font-weight="800" fill="#2d2420">ほったらかし</text>
  </g>

  <!-- feature: 煮込み (bottom right) -->
  <g>
    <circle cx="640" cy="365" r="52" fill="#ffffff" stroke="#e08a4a" stroke-width="2.5"/>
    <rect x="616" y="358" width="48" height="26" rx="8" fill="#e08a4a"/>
    <rect x="610" y="354" width="60" height="7" rx="3.5" fill="#e08a4a"/>
    <path d="M628 348 C 622 341, 634 337, 628 330" fill="none" stroke="#e08a4a" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <path d="M652 348 C 646 341, 658 337, 652 330" fill="none" stroke="#e08a4a" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <text x="640" y="438" text-anchor="middle" font-size="18" font-weight="800" fill="#2d2420">煮込み</text>
  </g>
</svg>
